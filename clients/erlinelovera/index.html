<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Gallery — TevezuMedia</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1E1208; --brown: #7C5C3E; --brown-light: #A07850;
      --brown-pale: #C9A882; --border: #DCC9B0;
      --cream: #FAF5EF; --cream-2: #F5EDE2;
      --bg: #F2E8D9; --muted: #7A6A5A; --muted-2: #9A8070;
    }
    html, body { height:100%; font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--ink); overflow:hidden; }
    body::after { content:''; position:fixed; inset:0; z-index:9999; pointer-events:none; opacity:0.032; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); background-size:180px; animation:grain 0.4s steps(1) infinite; }
    @keyframes grain { 0%{background-position:0 0} 25%{background-position:-30px 20px} 50%{background-position:20px -15px} 75%{background-position:-10px 30px} 100%{background-position:15px -5px} }
    .brand { font-family:'Cormorant Garamond',serif; font-size:18px; letter-spacing:0.16em; text-transform:uppercase; color:var(--brown-pale); position:fixed; top:2rem; left:0; right:0; text-align:center; opacity:0; animation:fadeUp 0.8s 0.2s ease forwards; }
    .screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem; text-align:center; }
    .lock-wrap { position:relative; margin-bottom:2rem; opacity:0; animation:fadeUp 0.8s 0.3s ease forwards; }
    .lock-circle { width:80px; height:80px; border-radius:50%; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; margin:0 auto; position:relative; }
    .lock-circle::before { content:''; position:absolute; inset:-8px; border-radius:50%; border:1px solid rgba(201,168,130,0.2); }
    .lock-circle svg { width:28px; height:28px; stroke:var(--brown); fill:none; stroke-width:1.5; }
    .lock-title { font-family:'Cormorant Garamond',serif; font-size:clamp(32px,6vw,52px); font-weight:300; color:var(--ink); line-height:1.1; margin-bottom:0.75rem; opacity:0; animation:fadeUp 0.8s 0.4s ease forwards; }
    .lock-title em { font-style:italic; color:var(--brown); }
    .lock-sub { font-size:14px; font-weight:300; color:var(--muted); line-height:1.7; max-width:340px; margin:0 auto 2.5rem; opacity:0; animation:fadeUp 0.8s 0.5s ease forwards; }
    .lock-form { width:100%; max-width:340px; opacity:0; animation:fadeUp 0.8s 0.6s ease forwards; }
    .input-row { display:flex; }
    .lock-input { flex:1; padding:14px 18px; border:1px solid var(--border); border-right:none; border-radius:0; background:var(--cream); font-size:14px; font-weight:300; color:var(--ink); outline:none; font-family:'DM Sans',sans-serif; letter-spacing:0.08em; text-align:center; transition:border-color 0.2s, box-shadow 0.2s; }
    .lock-input:focus { border-color:var(--brown); box-shadow:0 0 0 3px rgba(124,92,62,0.08); }
    .lock-input::placeholder { color:var(--muted-2); letter-spacing:0.04em; }
    .lock-btn { padding:14px 20px; background:var(--brown); color:var(--cream); border:none; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:12px; letter-spacing:0.12em; text-transform:uppercase; transition:background 0.2s; }
    .lock-btn:hover { background:var(--ink); }
    .lock-btn:disabled { opacity:0.6; cursor:not-allowed; }
    .lock-error { font-size:12px; color:#A32D2D; margin-top:10px; display:none; text-align:center; }
    .lock-error.visible { display:block; }
    #animCanvas { position:fixed; inset:0; z-index:500; pointer-events:none; display:none; }
    .unlock-message { position:fixed; inset:0; z-index:502; display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0; transition:opacity 0.7s; pointer-events:none; padding:2rem; text-align:center; }
    .unlock-message.show { opacity:1; }
    .unlock-message-title { font-family:'Cormorant Garamond',serif; font-size:clamp(30px,5vw,52px); font-weight:300; line-height:1.1; margin-bottom:0.75rem; }
    .unlock-message-title em { font-style:italic; }
    .unlock-message-sub { font-size:11px; font-weight:300; letter-spacing:0.14em; text-transform:uppercase; }
    .wipe { position:fixed; inset:0; z-index:600; transform:scaleX(0); transform-origin:left; transition:transform 0.6s cubic-bezier(0.76,0,0.24,1); }
    .wipe.go { transform:scaleX(1); }
    .portal-footer { position:fixed; bottom:1.5rem; left:0; right:0; text-align:center; font-size:11px; font-weight:300; color:var(--muted-2); letter-spacing:0.08em; opacity:0; animation:fadeUp 0.8s 0.9s ease forwards; }
    .portal-footer a { color:var(--brown-pale); text-decoration:none; transition:color 0.2s; }
    .portal-footer a:hover { color:var(--brown); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    @media (max-width:480px) { .input-row{flex-direction:column;} .lock-btn{width:100%; border-left:1px solid var(--border); padding:13px;} .lock-input{border-right:1px solid var(--border); border-bottom:none;} }
  </style>
</head>
<body>

  <div class="brand">TevezuMedia</div>

  <div class="screen" id="mainScreen">
    <div class="lock-wrap">
      <div class="lock-circle">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
    </div>
    <h1 class="lock-title">Your photos are<br><em>ready</em></h1>
    <p class="lock-sub">Enter the password Tevez sent you to access your private gallery.</p>
    <div class="lock-form">
      <div class="input-row">
        <input class="lock-input" id="passwordInput" type="password" placeholder="Enter your password" autocomplete="off" />
        <button class="lock-btn" id="unlockBtn" onclick="checkPassword()">Unlock</button>
      </div>
      <div class="lock-error" id="lockError">Incorrect password — check the email from Tevez.</div>
    </div>
  </div>

  <canvas id="animCanvas"></canvas>

  <div class="unlock-message" id="unlockMessage">
    <div class="unlock-message-title" id="msgTitle"></div>
    <div class="unlock-message-sub" id="msgSub">Redirecting you now...</div>
  </div>

  <div class="wipe" id="wipe"></div>
  <div class="portal-footer"><a href="/">← Back to TevezuMedia</a></div>

<script>
/* ============================================================
   CONFIGURATION — change these for each client
   ============================================================
   session types:
     "portraits"  — soft watercolor bleed
     "sports"     — motion blur speed lines
     "weddings"   — falling rose petals
     "lifestyle"  — golden hour warmth bloom
     "events"     — expanding stage spotlight
     "mixtapes"   — VHS static flicker
============================================================ */
var CONFIG = {
  password:    "erline",
  oneDriveUrl: "https://1drv.ms/f/c/9b859c591712b565/IgAvxIWOw0bbQo9pASVddYRDAU1mNAmgYd66758tXr5_KF4?e=CXSFYJ",
  session:     "portraits"
};
/* ============================================================ */

var s = document.createElement("style");
s.textContent = "@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}";
document.head.appendChild(s);

document.getElementById("passwordInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") checkPassword();
  document.getElementById("lockError").classList.remove("visible");
});

function checkPassword() {
  var val = document.getElementById("passwordInput").value.trim();
  if (val !== CONFIG.password) {
    document.getElementById("lockError").classList.add("visible");
    document.getElementById("passwordInput").value = "";
    document.getElementById("passwordInput").focus();
    var inp = document.getElementById("passwordInput");
    inp.style.animation = "shake 0.4s ease";
    setTimeout(function(){ inp.style.animation = ""; }, 400);
    return;
  }
  document.getElementById("unlockBtn").disabled = true;
  var canvas = document.getElementById("animCanvas");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.display = "block";
  var ctx = canvas.getContext("2d");
  var fn = {
    portraits: animPortraits,
    sports:    animSports,
    weddings:  animWeddings,
    lifestyle: animLifestyle,
    events:    animEvents,
    mixtapes:  animMixtapes
  }[CONFIG.session] || animPortraits;
  fn(canvas, ctx);
}

function showMsg(title, titleColor, subColor) {
  document.getElementById("msgTitle").innerHTML = title;
  document.getElementById("msgTitle").style.color = titleColor;
  document.getElementById("msgSub").style.color = subColor;
  document.getElementById("unlockMessage").classList.add("show");
}

function redirect(wipeColor, delay) {
  setTimeout(function() {
    var wipe = document.getElementById("wipe");
    wipe.style.background = wipeColor;
    wipe.classList.add("go");
    setTimeout(function(){ window.location.href = CONFIG.oneDriveUrl; }, 650);
  }, delay || 800);
}

/* ── 1. PORTRAITS — soft watercolor pools ── */
function animPortraits(canvas, ctx) {
  var W = canvas.width, H = canvas.height;
  var pools = [
    {x:W*0.5, y:H*0.5, r:0, speed:4,  color:"210,180,160", a:0.22, delay:0},
    {x:W*0.2, y:H*0.3, r:0, speed:3,  color:"190,165,148", a:0.18, delay:100},
    {x:W*0.8, y:H*0.7, r:0, speed:3.5,color:"205,190,170", a:0.20, delay:180},
    {x:W*0.1, y:H*0.8, r:0, speed:2.5,color:"220,195,172", a:0.16, delay:260},
    {x:W*0.9, y:H*0.2, r:0, speed:3,  color:"200,178,155", a:0.18, delay:320},
    {x:W*0.5, y:H*0.1, r:0, speed:2.8,color:"215,185,162", a:0.15, delay:400},
    {x:W*0.3, y:H*0.9, r:0, speed:3.2,color:"195,172,150", a:0.19, delay:460}
  ];
  var maxR = Math.sqrt(W*W+H*H), start=null, shown=false, done=false;
  function draw(ts) {
    if (!start) start=ts;
    var el=ts-start;
    ctx.clearRect(0,0,W,H);
    pools.forEach(function(p) {
      if (el<p.delay) return;
      p.r=Math.min(maxR,p.r+p.speed);
      var g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
      g.addColorStop(0,"rgba("+p.color+","+p.a+")");
      g.addColorStop(0.5,"rgba("+p.color+","+(p.a*0.55)+")");
      g.addColorStop(1,"rgba("+p.color+",0)");
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
    });
    // paper grain lines
    ctx.strokeStyle="rgba(200,180,155,0.03)"; ctx.lineWidth=1;
    for (var l=0;l<H;l+=3){ctx.beginPath();ctx.moveTo(0,l);ctx.lineTo(W,l);ctx.stroke();}
    var cov=pools[0].r>=maxR*0.72;
    if (cov&&!shown){shown=true;showMsg("Your portraits<br>are <em>ready</em>","#3B2A1A","rgba(80,60,40,0.45)");}
    if (cov&&!done){done=true;redirect("#C9A882",700);}
    if (!done) requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

/* ── 2. SPORTS — motion blur speed lines ── */
function animSports(canvas, ctx) {
  var W=canvas.width, H=canvas.height;
  var lines=[];
  for (var i=0;i<120;i++) {
    lines.push({
      y: Math.random()*H,
      x: -Math.random()*W*0.8,
      len: 100+Math.random()*400,
      speed: 35+Math.random()*80,
      w: 0.4+Math.random()*2.5,
      a: 0.3+Math.random()*0.7,
      delay: Math.random()*500
    });
  }
  var start=null, flash=0, shown=false, done=false;
  function draw(ts) {
    if (!start) start=ts;
    var el=ts-start;
    ctx.fillStyle="#050505"; ctx.fillRect(0,0,W,H);
    lines.forEach(function(l) {
      if (el<l.delay) return;
      l.x+=l.speed;
      var g=ctx.createLinearGradient(l.x,0,l.x+l.len,0);
      g.addColorStop(0,"rgba(255,255,255,0)");
      g.addColorStop(0.35,"rgba(255,255,255,"+l.a+")");
      g.addColorStop(0.7,"rgba(255,200,80,"+(l.a*0.5)+")");
      g.addColorStop(1,"rgba(255,255,255,0)");
      ctx.beginPath(); ctx.moveTo(l.x,l.y); ctx.lineTo(l.x+l.len,l.y);
      ctx.strokeStyle=g; ctx.lineWidth=l.w; ctx.stroke();
    });
    // shutter flash
    if (el>700) { flash=Math.min(1,(el-700)/180); ctx.fillStyle="rgba(255,255,255,"+flash+")"; ctx.fillRect(0,0,W,H); }
    if (flash>=0.95&&!shown){shown=true;showMsg("Your shots<br>are <em>fire</em>","#080808","rgba(8,8,8,0.4)");}
    if (flash>=0.95&&!done){done=true;redirect("#111",600);}
    if (!done) requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

/* ── 3. WEDDINGS — falling rose petals ── */
function animWeddings(canvas, ctx) {
  var W=canvas.width, H=canvas.height;
  var cols=["235,195,185","245,215,205","220,180,170","250,230,218","210,165,158","240,205,195"];
  var petals=[];
  for (var i=0;i<200;i++) {
    petals.push({
      x: Math.random()*W*1.4-W*0.2,
      y: -20-Math.random()*H*2,
      vy: 1.2+Math.random()*2.8,
      vx: (Math.random()-0.5)*1,
      rot: Math.random()*Math.PI*2,
      rv: (Math.random()-0.5)*0.05,
      rw: 7+Math.random()*16,
      rh: 4+Math.random()*9,
      c: cols[Math.floor(Math.random()*cols.length)],
      a: 0.45+Math.random()*0.55,
      sw: Math.random()*Math.PI*2,
      ss: 0.018+Math.random()*0.018
    });
  }
  var start=null, bg=0, shown=false, done=false;
  function draw(ts) {
    if (!start) start=ts;
    var el=ts-start;
    bg=Math.min(0.93,el/2200);
    ctx.fillStyle="rgba(248,238,230,"+bg+")"; ctx.fillRect(0,0,W,H);
    petals.forEach(function(p) {
      p.y+=p.vy; p.x+=p.vx+Math.sin(p.sw)*0.7; p.rot+=p.rv; p.sw+=p.ss;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.beginPath(); ctx.ellipse(0,0,p.rw/2,p.rh/2,0,0,Math.PI*2);
      // slight petal shape with bezier
      ctx.fillStyle="rgba("+p.c+","+p.a+")"; ctx.fill();
      // petal vein
      ctx.beginPath(); ctx.moveTo(0,-p.rh/2); ctx.lineTo(0,p.rh/2);
      ctx.strokeStyle="rgba("+p.c+","+(p.a*0.3)+")"; ctx.lineWidth=0.5; ctx.stroke();
      ctx.restore();
    });
    if (bg>=0.88&&!shown){shown=true;showMsg("Your wedding photos<br>are <em>beautiful</em>","#5C2A2A","rgba(92,42,42,0.4)");}
    if (bg>=0.88&&!done){done=true;redirect("#D4A0A0",1000);}
    if (!done) requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

/* ── 4. LIFESTYLE — golden hour bloom ── */
function animLifestyle(canvas, ctx) {
  var W=canvas.width, H=canvas.height;
  var ox=W*0.82, oy=H*0.88;
  var maxR=Math.sqrt(W*W+H*H)*1.3, r=0;
  var rays=[];
  for (var i=0;i<18;i++) {
    rays.push({angle:-Math.PI*0.95+i*(Math.PI*1.15/18)+(Math.random()-0.5)*0.08, w:0.035+Math.random()*0.07, a:0.05+Math.random()*0.09});
  }
  var start=null, haze=0, shown=false, done=false;
  function draw(ts) {
    if (!start) start=ts;
    var el=ts-start;
    r=Math.min(maxR,el*1.1);
    ctx.clearRect(0,0,W,H);
    // main bloom
    var g=ctx.createRadialGradient(ox,oy,0,ox,oy,r);
    g.addColorStop(0,"rgba(255,168,30,0.99)");
    g.addColorStop(0.12,"rgba(245,120,20,0.96)");
    g.addColorStop(0.35,"rgba(210,75,15,0.88)");
    g.addColorStop(0.6,"rgba(160,50,10,0.7)");
    g.addColorStop(0.85,"rgba(90,20,5,0.3)");
    g.addColorStop(1,"rgba(30,5,0,0)");
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    // rays
    haze+=0.003;
    rays.forEach(function(ray) {
      var a1=ray.angle+Math.sin(haze+ray.angle)*0.012;
      ctx.save(); ctx.beginPath(); ctx.moveTo(ox,oy);
      ctx.arc(ox,oy,r*1.05,a1,a1+ray.w); ctx.closePath();
      ctx.fillStyle="rgba(255,210,80,"+(ray.a*(Math.min(1,r/400)))+")"; ctx.fill(); ctx.restore();
    });
    // lens flare
    if (r>80) {
      var fa=Math.min(0.7,(r-80)/250);
      [40,18,8].forEach(function(rad,i) {
        ctx.beginPath(); ctx.arc(ox,oy,rad,0,Math.PI*2);
        ctx.fillStyle="rgba(255,"+(220+i*15)+","+(100+i*30)+","+fa*(0.8-i*0.2)+")"; ctx.fill();
      });
    }
    // atmospheric haze overlay
    var hg=ctx.createLinearGradient(0,H,0,0);
    hg.addColorStop(0,"rgba(255,120,20,0.12)"); hg.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle=hg; ctx.fillRect(0,0,W,H);
    var cov=r>=maxR*0.6;
    if (cov&&!shown){shown=true;showMsg("Your lifestyle shots<br>are <em>golden</em>","#FFF3DC","rgba(255,230,150,0.55)");}
    if (cov&&!done){done=true;redirect("#B04010",800);}
    if (!done) requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

/* ── 5. EVENTS — stage spotlight expand ── */
function animEvents(canvas, ctx) {
  var W=canvas.width, H=canvas.height;
  var cx=W/2, cy=H/2;
  var spots=[
    {x:cx,     y:cy,     r:0, speed:14, max:Math.max(W,H)*0.72, delay:0},
    {x:cx*0.28,y:cy*0.38,r:0, speed:9,  max:Math.max(W,H)*0.52, delay:380},
    {x:cx*1.72,y:cy*0.42,r:0, speed:10, max:Math.max(W,H)*0.48, delay:520}
  ];
  var start=null, darkBg=0, shown=false, done=false;
  var dust=[];
  for (var i=0;i<200;i++){dust.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2,vy:-(0.1+Math.random()*0.4),vx:(Math.random()-0.5)*0.2});}
  function draw(ts) {
    if (!start) start=ts;
    var el=ts-start;
    darkBg=Math.min(0.97,el/150);
    ctx.fillStyle="rgba(3,3,3,"+darkBg+")"; ctx.fillRect(0,0,W,H);
    spots.forEach(function(sp) {
      if (el<sp.delay) return;
      sp.r=Math.min(sp.max,sp.r+sp.speed);
      var g=ctx.createRadialGradient(sp.x,sp.y,0,sp.x,sp.y,sp.r);
      g.addColorStop(0,"rgba(255,248,218,0.92)");
      g.addColorStop(0.25,"rgba(255,235,170,0.6)");
      g.addColorStop(0.55,"rgba(220,185,90,0.2)");
      g.addColorStop(0.8,"rgba(180,140,50,0.06)");
      g.addColorStop(1,"rgba(0,0,0,0)");
      ctx.beginPath(); ctx.arc(sp.x,sp.y,sp.r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
      // hard bright core
      if (sp.r>15){
        var cg=ctx.createRadialGradient(sp.x,sp.y,0,sp.x,sp.y,Math.min(35,sp.r*0.18));
        cg.addColorStop(0,"rgba(255,255,245,0.95)"); cg.addColorStop(1,"rgba(255,255,245,0)");
        ctx.beginPath(); ctx.arc(sp.x,sp.y,Math.min(35,sp.r*0.18),0,Math.PI*2); ctx.fillStyle=cg; ctx.fill();
      }
    });
    // floating dust in light
    dust.forEach(function(d) {
      d.y+=d.vy; d.x+=d.vx;
      if (d.y<-5) d.y=H+5;
      var dx=d.x-cx, dy=d.y-cy;
      var dist=Math.sqrt(dx*dx+dy*dy);
      if (dist<spots[0].r*0.8) {
        ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
        ctx.fillStyle="rgba(255,240,180,"+(0.15*(1-dist/(spots[0].r*0.8)))+")"; ctx.fill();
      }
    });
    var cov=spots[0].r>=spots[0].max*0.88;
    if (cov&&!shown){shown=true;showMsg("Your event photos<br>are <em>lit</em>","#FFF8DC","rgba(255,235,150,0.5)");}
    if (cov&&!done){done=true;redirect("#120C00",900);}
    if (!done) requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

/* ── 6. MIXTAPES — VHS static flicker ── */
function animMixtapes(canvas, ctx) {
  var W=canvas.width, H=canvas.height;
  var start=null, shown=false, done=false;
  var glitchY=H/2, glitchDir=1, rollY=0;

  function noise(intensity) {
    var id=ctx.createImageData(W,H), d=id.data;
    for (var i=0;i<d.length;i+=4){
      var v=Math.random()<intensity?Math.floor(Math.random()*255):0;
      d[i]=v;d[i+1]=v;d[i+2]=v;d[i+3]=Math.floor(v*0.85);
    }
    ctx.putImageData(id,0,0);
  }

  function draw(ts) {
    if (!start) start=ts;
    var el=ts-start;
    ctx.fillStyle="#000"; ctx.fillRect(0,0,W,H);

    if (el<900) {
      // heavy static phase
      noise(0.4);
      // RGB split
      var off=Math.floor(Math.random()*16);
      ctx.fillStyle="rgba(255,0,50,0.07)"; ctx.fillRect(off,0,W,H);
      ctx.fillStyle="rgba(0,50,255,0.07)"; ctx.fillRect(-off,0,W,H);
      ctx.fillStyle="rgba(0,255,50,0.03)"; ctx.fillRect(0,off,W,H);
    } else if (el<2000) {
      // settling — scanlines emerge
      var si=0.4*(1-(el-900)/1100);
      noise(si);
      ctx.fillStyle="rgba(0,12,4,0.5)"; ctx.fillRect(0,0,W,H);
      // glitch tear
      glitchY+=glitchDir*(1.5+Math.random()*3);
      if (glitchY>H*0.82||glitchY<H*0.18) glitchDir*=-1;
      var th=6+Math.random()*18;
      try {
        var tear=ctx.getImageData(0,Math.floor(glitchY),W,Math.floor(th));
        ctx.putImageData(tear,Math.floor(Math.random()*24-12),Math.floor(glitchY+Math.random()*6-3));
      } catch(e){}
      // scanlines
      ctx.fillStyle="rgba(0,0,0,0.5)";
      for (var l=0;l<H;l+=2){ctx.fillRect(0,l,W,1);}
    } else {
      // green monitor phase
      ctx.fillStyle="rgba(0,14,5,0.94)"; ctx.fillRect(0,0,W,H);
      ctx.fillStyle="rgba(0,0,0,0.48)";
      for (var sl=0;sl<H;sl+=2){ctx.fillRect(0,sl,W,1);}
      // horizontal roll
      rollY=(rollY+0.8)%H;
      var rg=ctx.createLinearGradient(0,rollY-5,0,rollY+5);
      rg.addColorStop(0,"rgba(80,255,100,0)");
      rg.addColorStop(0.5,"rgba(80,255,100,0.12)");
      rg.addColorStop(1,"rgba(80,255,100,0)");
      ctx.fillStyle=rg; ctx.fillRect(0,rollY-5,W,10);
      // occasional bright flicker
      if (Math.random()<0.04){ctx.fillStyle="rgba(0,255,60,0.04)";ctx.fillRect(0,0,W,H);}
      // phosphor glow edge
      var pg=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.8);
      pg.addColorStop(0,"rgba(0,0,0,0)"); pg.addColorStop(1,"rgba(0,0,0,0.5)");
      ctx.fillStyle=pg; ctx.fillRect(0,0,W,H);
    }

    if (el>2000&&!shown) {
      shown=true;
      showMsg("Your mixtape<br>is <em>ready</em>","#00FF41","rgba(0,255,65,0.38)");
      document.getElementById("msgTitle").style.letterSpacing="0.06em";
    }
    if (el>2800&&!done){done=true;redirect("#001A00",400);}
    if (!done) requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}
</script>
