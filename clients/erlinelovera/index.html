<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Gallery — TevezuMedia</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1E1208; --brown: #7C5C3E; --brown-light: #A07850;
      --brown-pale: #C9A882; --border: #DCC9B0;
      --cream: #FAF5EF; --cream-2: #F5EDE2;
      --bg: #F2E8D9; --muted: #7A6A5A; --muted-2: #9A8070;
    }
    html, body {
      height: 100%; font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--ink);
      overflow: hidden;
    }

    /* GRAIN */
    body::after { content:''; position:fixed; inset:0; z-index:9999; pointer-events:none; opacity:0.032; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); background-size:180px; animation:grain 0.4s steps(1) infinite; }
    @keyframes grain { 0%{background-position:0 0} 25%{background-position:-30px 20px} 50%{background-position:20px -15px} 75%{background-position:-10px 30px} 100%{background-position:15px -5px} }

    /* MAIN SCREEN */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem; text-align: center;
      transition: opacity 0.5s ease;
    }

    /* BRAND */
    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--brown-pale);
      position: fixed; top: 2rem; left: 50%; transform: translateX(-50%);
      opacity: 0; animation: fadeUp 0.8s 0.2s ease forwards;
      white-space: nowrap;
    }

    /* LOCK ICON */
    .lock-wrap {
      position: relative; margin-bottom: 2rem;
      opacity: 0; animation: fadeUp 0.8s 0.3s ease forwards;
    }
    .lock-circle {
      width: 80px; height: 80px; border-radius: 50%;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto; position: relative;
      transition: border-color 0.4s, background 0.4s;
    }
    .lock-circle svg { width: 28px; height: 28px; stroke: var(--brown); fill: none; stroke-width: 1.5; transition: stroke 0.4s; }

    /* pulse ring */
    .lock-circle::before {
      content: ''; position: absolute; inset: -8px;
      border-radius: 50%; border: 1px solid rgba(201,168,130,0.2);
    }

    /* TITLE */
    .lock-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(32px, 6vw, 52px); font-weight: 300;
      color: var(--ink); line-height: 1.1; margin-bottom: 0.75rem;
      opacity: 0; animation: fadeUp 0.8s 0.4s ease forwards;
    }
    .lock-title em { font-style: italic; color: var(--brown); }

    .lock-sub {
      font-size: 14px; font-weight: 300; color: var(--muted);
      line-height: 1.7; max-width: 340px; margin: 0 auto 2.5rem;
      opacity: 0; animation: fadeUp 0.8s 0.5s ease forwards;
    }

    /* FORM */
    .lock-form {
      width: 100%; max-width: 340px;
      opacity: 0; animation: fadeUp 0.8s 0.6s ease forwards;
    }
    .input-row { display: flex; position: relative; }
    .lock-input {
      flex: 1; padding: 14px 50px 14px 18px;
      border: 1px solid var(--border); border-radius: 0;
      background: var(--cream); font-size: 14px; font-weight: 300;
      color: var(--ink); outline: none; font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.08em; text-align: center;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .lock-input:focus { border-color: var(--brown); box-shadow: 0 0 0 3px rgba(124,92,62,0.08); }
    .lock-input::placeholder { color: var(--muted-2); letter-spacing: 0.04em; }
    .lock-btn {
      padding: 14px 20px; background: var(--brown); color: var(--cream);
      border: none; cursor: pointer; font-family: 'DM Sans', sans-serif;
      font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
      transition: background 0.2s; white-space: nowrap;
    }
    .lock-btn:hover { background: var(--ink); }
    .lock-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .lock-error {
      font-size: 12px; color: #A32D2D; margin-top: 10px;
      display: none; text-align: center;
    }
    .lock-error.visible { display: block; }

    /* UNLOCK ANIMATION */
    .unlock-overlay {
      position: fixed; inset: 0; z-index: 500;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg); opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .unlock-overlay.active { opacity: 1; pointer-events: all; }

    .unlock-circle {
      width: 100px; height: 100px; border-radius: 50%;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      position: relative; margin-bottom: 1.5rem;
    }
    .unlock-circle svg { width: 36px; height: 36px; stroke: var(--brown); fill: none; stroke-width: 1.5; }

    /* spinning ring */
    .spin-ring {
      position: absolute; inset: -6px; border-radius: 50%;
      border: 1.5px solid transparent;
      border-top-color: var(--brown);
      border-right-color: var(--brown-pale);
      animation: spin 0.8s linear infinite;
      opacity: 0; transition: opacity 0.3s;
    }
    .unlock-overlay.active .spin-ring { opacity: 1; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* checkmark draw */
    .check-circle {
      width: 100px; height: 100px; border-radius: 50%;
      background: var(--brown); display: flex; align-items: center; justify-content: center;
      position: absolute; opacity: 0; transform: scale(0.5);
      transition: opacity 0.4s, transform 0.4s cubic-bezier(0.16,1,0.3,1);
    }
    .check-circle.show { opacity: 1; transform: scale(1); }
    .check-circle svg { width: 36px; height: 36px; stroke: var(--cream); fill: none; stroke-width: 2; stroke-dasharray: 50; stroke-dashoffset: 50; transition: stroke-dashoffset 0.5s 0.2s ease; }
    .check-circle.show svg { stroke-dashoffset: 0; }

    .unlock-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 300; color: var(--ink);
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.4s 0.3s, transform 0.4s 0.3s;
    }
    .unlock-overlay.active .unlock-text { opacity: 1; transform: translateY(0); }
    .unlock-text em { font-style: italic; color: var(--brown); }

    .unlock-sub {
      font-size: 12px; font-weight: 300; color: var(--muted-2);
      margin-top: 8px; letter-spacing: 0.04em;
      opacity: 0; transition: opacity 0.4s 0.5s;
    }
    .unlock-overlay.active .unlock-sub { opacity: 1; }

    /* page wipe out */
    .wipe {
      position: fixed; inset: 0; z-index: 600;
      background: var(--brown);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.6s cubic-bezier(0.76,0,0.24,1);
    }
    .wipe.go { transform: scaleX(1); }

    /* FOOTER */
    .portal-footer {
      position: fixed; bottom: 1.5rem; left: 0; right: 0;
      text-align: center;
      font-size: 11px; font-weight: 300; color: var(--muted-2);
      letter-spacing: 0.08em;
      opacity: 0; animation: fadeUp 0.8s 0.9s ease forwards;
    }
    .portal-footer a { color: var(--brown-pale); text-decoration: none; transition: color 0.2s; }
    .portal-footer a:hover { color: var(--brown); }

    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

    @media (max-width: 480px) {
      .input-row { flex-direction: column; }
      .lock-btn { width: 100%; padding: 13px; }
    }
  </style>
</head>
<body>

  <div class="brand">TevezuMedia</div>

  <div class="screen" id="mainScreen">
    <div class="lock-wrap">
      <div class="lock-circle">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
    </div>

    <h1 class="lock-title">Your photos are<br><em>ready</em></h1>
    <p class="lock-sub">Enter the password Tevez sent you to access your private gallery.</p>

    <div class="lock-form">
      <div class="input-row">
        <input
          class="lock-input" id="passwordInput"
          type="password" placeholder="Enter your password"
          autocomplete="off"
        />
        <button class="lock-btn" id="unlockBtn" onclick="checkPassword()">Unlock</button>
      </div>
      <div class="lock-error" id="lockError">Incorrect password — check the email from Tevez.</div>
    </div>
  </div>

  <!-- UNLOCK ANIMATION OVERLAY -->
  <div class="unlock-overlay" id="unlockOverlay">
    <div style="position:relative; width:100px; height:100px; margin-bottom:1.5rem;">
      <div class="unlock-circle">
        <div class="spin-ring"></div>
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <div class="check-circle" id="checkCircle">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
    </div>
    <div class="unlock-text">Opening your <em>gallery</em></div>
    <div class="unlock-sub">You'll be redirected in a moment...</div>
  </div>

  <div class="wipe" id="wipe"></div>

  <div class="portal-footer">
    <a href="/">← Back to TevezuMedia</a>
  </div>

<script>
  /* ============================================================
     CONFIGURATION — change these for each client
     ============================================================ */
  var CONFIG = {
    password:   "erline",
    oneDriveUrl: "https://1drv.ms/f/c/9b859c591712b565/IgAvxIWOw0bbQo9pASVddYRDAXXk8R8oWP9-uXR2kAzyyAE?e=5jR1po"
    /* Replace the URL above with the OneDrive shared folder link for this client */
  };
  /* ============================================================ */

  document.getElementById("passwordInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") checkPassword();
    document.getElementById("lockError").classList.remove("visible");
  });

  function checkPassword() {
    var val = document.getElementById("passwordInput").value.trim();
    if (val !== CONFIG.password) {
      document.getElementById("lockError").classList.add("visible");
      document.getElementById("passwordInput").value = "";
      document.getElementById("passwordInput").focus();
      // shake the input
      var input = document.getElementById("passwordInput");
      input.style.animation = "shake 0.4s ease";
      setTimeout(function(){ input.style.animation = ""; }, 400);
      return;
    }
    // Correct — start unlock animation
    document.getElementById("unlockBtn").disabled = true;
    var overlay = document.getElementById("unlockOverlay");
    overlay.classList.add("active");

    // After spin, show checkmark
    setTimeout(function() {
      document.getElementById("checkCircle").classList.add("show");
    }, 900);

    // After checkmark, wipe and redirect
    setTimeout(function() {
      document.getElementById("wipe").classList.add("go");
    }, 1600);

    setTimeout(function() {
      window.location.href = CONFIG.oneDriveUrl;
    }, 2200);
  }

  /* shake keyframe injected via JS */
  var style = document.createElement("style");
  style.textContent = "@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }";
  document.head.appendChild(style);
</script>
</body>
</html>
