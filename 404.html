<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — TevezuMedia</title>
  <meta name="description" content="Page not found — TevezuMedia Boston Photography" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brown: #7C5C3E; --brown-pale: #C9A882; --brown-light: #A07850;
      --cream: #FAF5EF; --cream-2: #F5EDE2; --border: #DCC9B0;
      --muted: #7A6A5A; --muted-2: #9A8070; --ink: #1E1208;
    }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0E0804; color: var(--cream);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; position: relative;
    }

    /* GRAIN */
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 999; pointer-events: none; opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 180px; animation: grainShift 0.4s steps(1) infinite;
    }
    @keyframes grainShift { 0%{background-position:0 0} 25%{background-position:-30px 20px} 50%{background-position:20px -15px} 75%{background-position:-10px 30px} 100%{background-position:15px -5px} }

    canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .content {
      position: relative; z-index: 1;
      padding: 2rem;
      animation: fadeUp 1s 0.3s ease both;
    }

    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px; font-weight: 400; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--brown-pale);
      margin-bottom: 3rem; opacity: 0.7;
      text-decoration: none; display: block;
      transition: opacity 0.2s;
    }
    .brand:hover { opacity: 1; }

    .num {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(100px, 22vw, 200px);
      font-weight: 300; line-height: 1;
      color: transparent;
      -webkit-text-stroke: 1px rgba(201,168,130,0.3);
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
      animation: fadeUp 1s 0.5s ease both;
    }

    .title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(24px, 5vw, 42px);
      font-weight: 300; color: var(--cream);
      margin-bottom: 1rem; line-height: 1.1;
    }
    .title em { font-style: italic; color: var(--brown-pale); }

    .sub {
      font-size: 14px; font-weight: 300;
      color: rgba(201,168,130,0.5);
      line-height: 1.7; max-width: 360px;
      margin: 0 auto 2.5rem;
    }

    .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    .btn-primary {
      padding: 12px 32px; background: var(--brown); color: var(--cream);
      font-size: 12px; font-weight: 400; letter-spacing: 0.12em;
      text-transform: uppercase; text-decoration: none; border-radius: 2px;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-primary:hover { background: rgba(124,92,62,0.8); transform: translateY(-2px); }

    .btn-ghost {
      padding: 12px 32px; background: transparent;
      color: rgba(201,168,130,0.6); font-size: 12px; font-weight: 400;
      letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none;
      border: 1px solid rgba(201,168,130,0.2); border-radius: 2px;
      transition: all 0.2s;
    }
    .btn-ghost:hover { border-color: rgba(201,168,130,0.5); color: var(--brown-pale); transform: translateY(-2px); }

    .links {
      margin-top: 2.5rem;
      display: flex; gap: 2rem; justify-content: center;
    }
    .links a {
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(201,168,130,0.3); text-decoration: none; transition: color 0.2s;
    }
    .links a:hover { color: var(--brown-pale); }

    @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

    @media (max-width: 480px) { .num { font-size: 120px; } }
  </style>
</head>
<body>

  <canvas id="starCanvas"></canvas>

  <div class="content">
    <a href="index.html" class="brand">TevezuMedia</a>
    <div class="num">404</div>
    <h1 class="title">Lost in <em>space</em></h1>
    <p class="sub">This page drifted off into the universe. Let's get you back to somewhere familiar.</p>
    <div class="btn-row">
      <a href="index.html" class="btn-primary">Go home</a>
      <a href="gallery.html" class="btn-ghost">View gallery</a>
    </div>
    <div class="links">
      <a href="pricing.html">Pricing</a>
      <a href="contact.html">Contact</a>
      <a href="https://instagram.com/tevezumedia" target="_blank">Instagram</a>
    </div>
  </div>

<script>
  const canvas = document.getElementById("starCanvas");
  const ctx = canvas.getContext("2d");
  let stars = [], shootingStars = [];

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initStars(); }
  window.addEventListener("resize", resize);

  function initStars() {
    stars = [];
    const count = Math.floor((canvas.width * canvas.height) / 2800);
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.2,
        alpha: Math.random() * 0.7 + 0.15,
        speed: Math.random() * 0.004 + 0.001,
        phase: Math.random() * Math.PI * 2,
        color: Math.random() > 0.85 ? "rgba(230,200,160," : "rgba(220,220,240,"
      });
    }
  }
  resize();

  setInterval(() => {
    shootingStars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height * 0.5,
      len: Math.random() * 120 + 60,
      speed: Math.random() * 8 + 5,
      alpha: 1, angle: Math.PI / 4 + (Math.random() - 0.5) * 0.3, life: 1
    });
  }, 3000);

  function animate(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // nebula
    const nb = ctx.createRadialGradient(canvas.width*.25, canvas.height*.6, 0, canvas.width*.25, canvas.height*.6, 300);
    nb.addColorStop(0, "rgba(124,92,62,0.05)"); nb.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = nb; ctx.fillRect(0, 0, canvas.width, canvas.height);

    // stars
    stars.forEach(s => {
      const tw = s.alpha + Math.sin(t * s.speed * 60 + s.phase) * 0.25;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.color + Math.max(0, Math.min(1, tw)) + ")";
      ctx.fill();
      if (s.r > 1.2) {
        ctx.strokeStyle = s.color + tw * 0.3 + ")"; ctx.lineWidth = 0.4;
        ctx.beginPath();
        ctx.moveTo(s.x - s.r * 2.5, s.y); ctx.lineTo(s.x + s.r * 2.5, s.y);
        ctx.moveTo(s.x, s.y - s.r * 2.5); ctx.lineTo(s.x, s.y + s.r * 2.5);
        ctx.stroke();
      }
    });

    // shooting stars
    shootingStars = shootingStars.filter(ss => ss.life > 0);
    shootingStars.forEach(ss => {
      ss.x += Math.cos(ss.angle) * ss.speed;
      ss.y += Math.sin(ss.angle) * ss.speed;
      ss.life -= 0.02;
      const tx = ss.x - Math.cos(ss.angle) * ss.len, ty = ss.y - Math.sin(ss.angle) * ss.len;
      const g = ctx.createLinearGradient(tx, ty, ss.x, ss.y);
      g.addColorStop(0, "rgba(232,217,192,0)");
      g.addColorStop(1, `rgba(232,217,192,${ss.life})`);
      ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(ss.x, ss.y);
      ctx.strokeStyle = g; ctx.lineWidth = 1.5; ctx.stroke();
    });

    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
</script>

</body>
</html>
